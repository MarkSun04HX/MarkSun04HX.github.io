<!-- Mermaid for notes/personal-notes: run on window.load (after async MathJax), then typeset math again. -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10.9.1/dist/mermaid.min.js" crossorigin="anonymous"></script>
<script>
  window.addEventListener('load', function () {
    if (typeof mermaid === 'undefined') return;
    mermaid.initialize({
      startOnLoad: false,
      theme: 'neutral',
      securityLevel: 'strict',
      fontFamily: 'ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif'
    });
    mermaid.run({ querySelector: '.mermaid' }).catch(function () {}).then(function () {
      if (window.MathJax && typeof MathJax.typesetPromise === 'function') {
        return MathJax.typesetPromise().catch(function () {});
      }
    });
  });
</script>
