# Verifies Jekyll builds on every push and PR (does not deploy).
name: Beautiful Jekyll CI

on:
  - push
  - pull_request

jobs:
  build:
    name: Build Jekyll
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Install dependencies
        run: bundle install && bundle exec appraisal install
      - name: Site config for user site (served at repo root)
        run: |
          printf '%s\n' '---' 'baseurl: ""' > _config_ci.yml
      - name: Build site
        env:
          JEKYLL_ENV: production
        run: bundle exec appraisal jekyll build --future --config _config_ci.yml,_config.yml
